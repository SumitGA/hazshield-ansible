---
- name: Install Redis
  apt:
    name: redis-server
    state: present
    update_cache: true

- name: Deploy redis config
  template:
    src: redis-hazshield.conf.j2
    dest: /etc/redis/redis.conf
    owner: redis
    group: redis
    mode: "0640"
  notify: restart redis

- name: Enable memory overcommit (required for safe AOF rewrites)
  ansible.posix.sysctl:
    name: vm.overcommit_memory
    value: "1"
    state: present
    reload: true

- name: Ensure redis started
  service:
    name: redis-server
    state: started
    enabled: true


