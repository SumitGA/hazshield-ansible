# Run from your workstation or the homelab host.
# Everything reaches the tenant VMs through the edge bastion (ProxyJump),
# matching the security-group design: only edge accepts SSH from the LAN.
# REPLACE <EDGE_FLOATING_IP> below (or rely on ~/.ssh/config if you
# installed the ssh_config_hint — then just use the host aliases).

[edge]
hazshield-edge ansible_host=192.168.0.226 ansible_user=ubuntu

[state]
hazshield-state ansible_host=10.10.0.12 ansible_user=ubuntu

[compute]
hazshield-compute ansible_host=10.10.0.13 ansible_user=ubuntu

[state:vars]
ansible_ssh_common_args=-o ProxyJump=ubuntu@192.168.0.226

[compute:vars]
ansible_ssh_common_args=-o ProxyJump=ubuntu@192.168.0.226
